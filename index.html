<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Habit Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color: #f5f5f5; }
.card { border-radius: 12px; transition: 0.3s; }
.card:hover { transform: scale(1.02); }
.form-control { border-radius: 8px; }

button { border-radius: 10px; }
.progress { height: 20px; }
</style>
</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">🏥 Health Habit Tracker</h2>

<!-- Cards -->
<div class="row text-center mb-4">

<div class="col-md-4">
<div class="card bg-primary text-white shadow">
<div class="card-body">
<h5>💧 Water</h5>
<h6>Target: 4L</h6>
<h3 id="waterCard">0L</h3>
<small id="waterRemain"></small>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card bg-success text-white shadow">
<div class="card-body">
<h5>😴 Sleep</h5>
<h6>Target: 8h</h6>
<h3 id="sleepCard">0h</h3>
<small id="sleepRemain"></small>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card bg-danger text-white shadow">
<div class="card-body">
<h5>🏃 Exercise</h5>
<h6>Target: 1hr</h6>
<h3 id="exerciseCard">0m</h3>
<small id="exerciseRemain"></small>
</div>
</div>
</div>

</div>

<!-- Form -->
<div class="card shadow mb-4 p-4">

<h4 class="text-center fw-bold text-dark mb-4">✨ Add Daily Habit</h4>

<div class="row">

<div class="col-md-3">
<label class="fw-bold fs-5">📌 Habit</label>
<select id="habit" class="form-control">
<option>Water</option>
<option>Sleep</option>
<option>Exercise</option>
</select>
</div>

<div class="col-md-3">
<label class="fw-bold fs-5">📊 Value</label>
<div class="input-group">
<input id="value" type="number" min="1" class="form-control">
<select id="unit" class="form-select">
<option value="L">Lit</option>
<option value="h">Hour</option>
<option value="min">Min</option>
</select>
</div>
</div>

<div class="col-md-3">
<label class="fw-bold fs-5">📅 Date</label>
<input id="date" type="date" class="form-control">
</div>

<div class="col-md-3">
<label class="fw-bold fs-5">⏰ Time</label>
<input id="time" type="time" class="form-control">
</div>

</div>

<div class="d-flex justify-content-between mt-3">
<button onclick="addHabit()" class="btn btn-primary">➕ Add</button>
<button onclick="resetData()" class="btn btn-danger">🗑 Reset</button>
</div>

</div>

<!-- Summary -->
<div class="alert alert-info text-center fw-bold">
Today Summary → <span id="summaryText">0</span>
</div>

<!-- Table -->
<div class="card shadow mb-4">
<div class="card-body">
<h5>📊 Today Log</h5>

<table class="table table-striped">
<thead class="table-dark">
<tr>
<th>Date</th>
<th>Time</th>
<th>Habit</th>
<th>Value</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>
</div>

<!-- Progress -->
<div class="card shadow mb-4 text-center">
<div class="card-body">
<h5>📈 Progress</h5>

<div class="progress mb-3">
<div id="waterBar" class="progress-bar bg-success">0%</div>
</div>

<div class="progress mb-3">
<div id="sleepBar" class="progress-bar bg-primary">0%</div>
</div>

<div class="progress">
<div id="exerciseBar" class="progress-bar bg-danger">0%</div>
</div>

</div>
</div>

</div>

<script>

let habits = JSON.parse(localStorage.getItem("habits")) || [];
let today = new Date().toISOString().split("T")[0];

let waterTarget = 4;
let sleepTarget = 8;
let exerciseTarget = 60;

// Auto date/time
let now = new Date();
document.getElementById("date").value = today;

let h = now.getHours().toString().padStart(2,'0');
let m = now.getMinutes().toString().padStart(2,'0');
document.getElementById("time").value = h + ":" + m;

// Convert to 12-hour
function convertTo12Hour(time) {
let [hour, minute] = time.split(":");
hour = parseInt(hour);
let ampm = hour >= 12 ? "PM" : "AM";
hour = hour % 12 || 12;
return hour + ":" + minute + " " + ampm;
}

function showHabits() {

let output = "";
let water = 0, sleep = 0, exercise = 0;

habits.forEach((h, index) => {

if (h.date === today) {

output += `
<tr>
<td>${h.date}</td>
<td>${h.time}</td>
<td>${h.name}</td>
<td>${h.value} ${h.unit}</td>
<td><button class="btn btn-danger btn-sm" onclick="deleteHabit(${index})">Delete</button></td>
</tr>
`;

if (h.name === "Water") water += Number(h.value);
if (h.name === "Sleep") sleep += Number(h.value);

if (h.name === "Exercise") {
if(h.unit === "h") exercise += Number(h.value) * 60;
else exercise += Number(h.value);
}

}

});

document.getElementById("tableBody").innerHTML = output;

// Empty state
if(output === ""){
document.getElementById("tableBody").innerHTML =
"<tr><td colspan='5' class='text-center text-muted'>No data added yet</td></tr>";
}

// Cards
document.getElementById("waterCard").innerText = water + "L";
document.getElementById("sleepCard").innerText = sleep + "h";
document.getElementById("exerciseCard").innerText = exercise + "m";

// Remaining
document.getElementById("waterRemain").innerText =
"Remaining: " + Math.max(waterTarget - water, 0) + "L";

document.getElementById("sleepRemain").innerText =
"Remaining: " + Math.max(sleepTarget - sleep, 0) + "h";

// ✅ FIXED EXERCISE REMAINING (always minutes)
let remEx = Math.max(exerciseTarget - exercise, 0);
document.getElementById("exerciseRemain").innerText =
"Remaining: " + remEx + " min";

// Progress
let wp = Math.min((water / waterTarget) * 100, 100);
let sp = Math.min((sleep / sleepTarget) * 100, 100);
let ep = Math.min((exercise / exerciseTarget) * 100, 100);

document.getElementById("waterBar").style.width = wp + "%";
document.getElementById("waterBar").innerText = Math.round(wp) + "%";

document.getElementById("sleepBar").style.width = sp + "%";
document.getElementById("sleepBar").innerText = Math.round(sp) + "%";

document.getElementById("exerciseBar").style.width = ep + "%";
document.getElementById("exerciseBar").innerText = Math.round(ep) + "%";

// Summary
document.getElementById("summaryText").innerText =
`Water: ${water}/4L | Sleep: ${sleep}/8h | Exercise: ${exercise}/60m`;

}

function addHabit() {

let name = document.getElementById("habit").value;
let value = document.getElementById("value").value;
let unit = document.getElementById("unit").value;
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;

if (!value || !date || !time) {
alert("Fill all fields");
return;
}

if (value <= 0) {
alert("Value must be positive");
return;
}

// Limits
if(name === "Water" && value > 10){ alert("Max 10L"); return; }
if(name === "Sleep" && value > 24){ alert("Max 24h"); return; }
if(name === "Exercise" && value > 300){ alert("Max 300 min"); return; }

let finalTime = convertTo12Hour(time);

habits.push({ name, value, unit, date, time: finalTime });

localStorage.setItem("habits", JSON.stringify(habits));

document.getElementById("value").value = "";

showHabits();
}

function deleteHabit(index) {
habits.splice(index, 1);
localStorage.setItem("habits", JSON.stringify(habits));
showHabits();
}

function resetData() {
if(confirm("Are you sure you want to delete all data?")){
localStorage.removeItem("habits");
habits = [];
showHabits();
}
}

showHabits();

</script>

</body>
</html>
